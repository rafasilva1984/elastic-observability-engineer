version: "3.8"

# Projeto: observabilidade-na-pratica-ilm-docker
# Objetivo: ver o ciclo de vida completo de um data stream em MINUTOS:
# política ILM com rollover agressivo -> hot -> warm -> delete,
# acompanhado pela ILM Explain API e pelo Kibana.
#
# Fontes oficiais:
# - https://www.elastic.co/docs/manage-data/lifecycle/index-lifecycle-management
# - Tutorial "Automate rollover with ILM" (política + template + data stream)

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-onp
    environment:
      - node.name=es-onp
      - discovery.type=single-node
      - cluster.name=onp-cluster
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ["9200:9200"]
    volumes: [ "es-data:/usr/share/elasticsearch/data" ]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [ onp-net ]

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kb-onp
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      - SERVER_NAME=kibana-onp
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    ports: ["5601:5601"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks: [ onp-net ]

volumes:
  es-data:

networks:
  onp-net:
    driver: bridge
