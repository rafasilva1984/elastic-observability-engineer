version: "3.8"

# Projeto: observabilidade-na-pratica-opentelemetry-elastic-docker
# Objetivo: microsserviços em DUAS linguagens (Node e Python) instrumentados
# com OpenTelemetry (auto-instrumentação), enviando OTLP para um
# OTel Collector (contrib), que exporta para o APM Server do Elastic —
# que suporta OTLP nativamente.
#
# Fontes oficiais:
# - https://www.elastic.co/docs/solutions/observability/apm/opentelemetry
# - https://www.elastic.co/docs/solutions/observability/apm/opentelemetry/upstream-opentelemetry-collectors-language-sdks
# - https://opentelemetry.io/docs/collector/configuration/

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-onp
    environment:
      - node.name=es-onp
      - discovery.type=single-node
      - cluster.name=onp-cluster
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ["9200:9200"]
    volumes: [ "es-data:/usr/share/elasticsearch/data" ]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [ onp-net ]

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kb-onp
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      - SERVER_NAME=kibana-onp
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=onp_chave_fixa_de_32_caracteres_min_2026
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_FLEET_AGENTS_ELASTICSEARCH_HOST=http://elasticsearch:9200
    ports: ["5601:5601"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks: [ onp-net ]

  # Fleet Server + integração APM (mesmo fluxo do Vídeo 6):
  # o APM Server nasce da integração e ACEITA OTLP NATIVAMENTE na 8200.
  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    container_name: fleet-server-onp
    depends_on:
      kibana: { condition: service_healthy }
    user: root
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_INSECURE=true
      - KIBANA_FLEET_SETUP=true
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "8220:8220"
      - "8200:8200"
    networks: [ onp-net ]

  # OTel Collector (contrib): a peça central da aula.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: otel-collector-onp
    command: ["--config=/etc/otelcol/config.yml"]
    environment:
      - APM_SECRET_TOKEN=${APM_SECRET_TOKEN}
    volumes:
      - ./config/otel-collector.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on: [ fleet-server ]
    networks: [ onp-net ]

  # ---- Microsserviços OTel em duas linguagens ----
  catalogo:
    build: ./src/catalogo-python
    container_name: catalogo-onp
    environment:
      # Config 100% por env (padrão OTel):
      - OTEL_SERVICE_NAME=catalogo
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=lab,service.version=1.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # Python (distro) usa gRPC por padrão -> 4317
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=none
    depends_on: [ otel-collector ]
    networks: [ onp-net ]

  vitrine:
    build: ./src/vitrine-node
    container_name: vitrine-onp
    environment:
      - OTEL_SERVICE_NAME=vitrine
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=lab,service.version=1.0
      # Node (auto-instrumentations register) usa OTLP/HTTP por padrão -> 4318
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - CATALOGO_URL=http://catalogo:5002
    ports: ["5003:5003"]
    depends_on: [ catalogo, otel-collector ]
    networks: [ onp-net ]

  trafego:
    image: alpine/curl:8.9.1
    container_name: trafego-onp
    depends_on: [ vitrine ]
    command: >
      sh -c 'while true; do
        curl -s http://vitrine:5003/produtos > /dev/null;
        sleep 2;
      done'
    networks: [ onp-net ]

volumes:
  es-data:

networks:
  onp-net:
    driver: bridge
