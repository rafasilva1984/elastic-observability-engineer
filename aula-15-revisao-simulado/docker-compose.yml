version: "3.8"

# Projeto: observabilidade-na-pratica-revisao-simulado-docker
# Objetivo: ARENA DO SIMULADO — a plataforma completa (Elasticsearch,
# Kibana e Fleet Server capaz de rodar a integração APM na porta 8200 e
# com path.repo para a tarefa de snapshot) sobre a qual as 12 tarefas
# cronometradas do simulado são executadas.
#
# Fonte oficial do fluxo:
# https://www.elastic.co/docs/solutions/observability/apm/apm-server/fleet-managed

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-onp
    environment:
      - node.name=es-onp
      - discovery.type=single-node
      - cluster.name=onp-cluster
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - path.repo=/snapshots
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ["9200:9200"]
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - snapshots:/snapshots
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [ onp-net ]

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kb-onp
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      - SERVER_NAME=kibana-onp
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=onp_chave_fixa_de_32_caracteres_min_2026
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_FLEET_AGENTS_ELASTICSEARCH_HOST=http://elasticsearch:9200
    ports: ["5601:5601"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks: [ onp-net ]

  # Fleet Server que TAMBÉM roda o APM Server: a integração Elastic APM é
  # adicionada à policy dele no Kibana (fluxo recomendado na doc oficial
  # para começar). Por isso ele expõe a 8220 (Fleet) e a 8200 (APM).
  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    container_name: fleet-server-onp
    depends_on:
      kibana: { condition: service_healthy }
    user: root
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_INSECURE=true
      - KIBANA_FLEET_SETUP=true
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "8220:8220"
      - "8200:8200"
    networks: [ onp-net ]

volumes:
  es-data:
  snapshots:

networks:
  onp-net:
    driver: bridge
