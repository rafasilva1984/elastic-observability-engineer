version: "3.8"

# Projeto: observabilidade-na-pratica-apm-troubleshooting-snapshots-docker
# Objetivo: (A) TROUBLESHOOTING de APM — quebrar de propósito o secret
# token de um serviço e diagnosticar com o checklist oficial; e
# (B) SEARCHABLE SNAPSHOTS — repositório fs (path.repo), snapshot e
# índice montado pesquisável. Base:
# APM Server rodando via integração APM no Elastic Agent do Fleet Server,
# e uma aplicação multisserviço (loja-api -> pagamento) instrumentada com
# o agente APM oficial de Python — incluindo endpoint lento e endpoint com
# erro proposital para a investigação da aula.
#
# Fonte oficial do fluxo:
# https://www.elastic.co/docs/solutions/observability/apm/apm-server/fleet-managed

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-onp
    environment:
      - node.name=es-onp
      - discovery.type=single-node
      - cluster.name=onp-cluster
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - path.repo=/snapshots
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ["9200:9200"]
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - snapshots:/snapshots
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks: [ onp-net ]

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kb-onp
    depends_on:
      elasticsearch: { condition: service_healthy }
    environment:
      - SERVER_NAME=kibana-onp
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_FLEET_AGENTS_ELASTICSEARCH_HOST=http://elasticsearch:9200
    ports: ["5601:5601"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks: [ onp-net ]

  # Fleet Server que TAMBÉM roda o APM Server: a integração Elastic APM é
  # adicionada à policy dele no Kibana (fluxo recomendado na doc oficial
  # para começar). Por isso ele expõe a 8220 (Fleet) e a 8200 (APM).
  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    container_name: fleet-server-onp
    depends_on:
      kibana: { condition: service_healthy }
    user: root
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_INSECURE=true
      - KIBANA_FLEET_SETUP=true
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "8220:8220"
      - "8200:8200"
    networks: [ onp-net ]

  # ---- Aplicação multisserviço instrumentada ----
  pagamento:
    build: ./src/pagamento
    container_name: pagamento-onp
    environment:
      - ELASTIC_APM_SERVICE_NAME=pagamento
      - ELASTIC_APM_SERVER_URL=http://fleet-server:8200
      - ELASTIC_APM_SECRET_TOKEN=${APM_SECRET_TOKEN}
      - ELASTIC_APM_ENVIRONMENT=lab
    networks: [ onp-net ]

  loja-api:
    build: ./src/loja-api
    container_name: loja-api-onp
    depends_on: [ pagamento ]
    environment:
      - ELASTIC_APM_SERVICE_NAME=loja-api
      - ELASTIC_APM_SERVER_URL=http://fleet-server:8200
      - ELASTIC_APM_SECRET_TOKEN=${APM_SECRET_TOKEN}
      - ELASTIC_APM_ENVIRONMENT=lab
      - PAGAMENTO_URL=http://pagamento:5001
    ports: ["5000:5000"]
    networks: [ onp-net ]

  # Gerador de tráfego: bate nos 3 endpoints em loop para alimentar a APM app.
  trafego:
    image: alpine/curl:8.9.1
    container_name: trafego-onp
    depends_on: [ loja-api ]
    command: >
      sh -c 'while true; do
        curl -s http://loja-api:5000/checkout > /dev/null;
        curl -s http://loja-api:5000/checkout > /dev/null;
        curl -s http://loja-api:5000/lento > /dev/null;
        curl -s http://loja-api:5000/erro > /dev/null;
        sleep 2;
      done'
    networks: [ onp-net ]

volumes:
  es-data:
  snapshots:

networks:
  onp-net:
    driver: bridge
