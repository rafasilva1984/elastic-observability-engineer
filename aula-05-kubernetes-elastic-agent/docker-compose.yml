version: "3.8"

# Projeto: observabilidade-na-pratica-kubernetes-elastic-agent
# Objetivo: monitorar um cluster Kubernetes local (k3d) com Elastic Agent
# gerenciado por Fleet, usando a integração Kubernetes + kube-state-metrics.
#
# A rede tem nome FIXO (onp-net) para que o cluster k3d consiga se conectar
# a ela e os pods do Elastic Agent resolvam "fleet-server" e "elasticsearch"
# pelo DNS do Docker (o DaemonSet oficial usa hostNetwork: true).
#
# Fonte oficial do fluxo:
# https://www.elastic.co/docs/reference/fleet/running-on-kubernetes-managed-by-fleet

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: es-onp
    environment:
      - node.name=es-onp
      - discovery.type=single-node
      - cluster.name=onp-cluster
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - onp-net

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    container_name: kb-onp
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - SERVER_NAME=kibana-onp
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_FLEET_AGENTS_ELASTICSEARCH_HOST=http://elasticsearch:9200
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
    networks:
      - onp-net

  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    container_name: fleet-server-onp
    depends_on:
      kibana:
        condition: service_healthy
    user: root
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_INSECURE=true
      - KIBANA_FLEET_SETUP=true
      - KIBANA_HOST=http://kibana:5601
      - KIBANA_FLEET_USERNAME=elastic
      - KIBANA_FLEET_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "8220:8220"
    networks:
      - onp-net

volumes:
  es-data:

networks:
  onp-net:
    # Nome fixo: o k3d se conecta a esta rede com `--network onp-net`
    name: onp-net
    driver: bridge
